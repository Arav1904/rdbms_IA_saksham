<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>Applications — Paws Shelter</title>
  <link rel="stylesheet" href="css/main.css"/>
</head>
<body>
<div class="app-shell">
  <div id="sidebar-mount">
    <div class="sidebar-logo"><div class="logo-icon">🐾</div><h2><span>Paws</span> Shelter<br>System</h2></div>
    <nav class="sidebar-nav">
      <div class="nav-section-label">Overview</div>
      <a href="index.html"        class="nav-item"><span class="icon">📊</span> Dashboard</a>
      <div class="nav-section-label">Animals</div>
      <a href="pets.html"         class="nav-item"><span class="icon">🐾</span> All Pets</a>
      <a href="training.html"     class="nav-item"><span class="icon">🎓</span> Training</a>
      <div class="nav-section-label">Adoption</div>
      <a href="adopters.html"     class="nav-item"><span class="icon">👥</span> Adopters</a>
      <a href="applications.html" class="nav-item active"><span class="icon">📋</span> Applications</a>
      <div class="nav-section-label">Care</div>
      <a href="appointments.html" class="nav-item"><span class="icon">📅</span> Appointments</a>
      <a href="medical.html"      class="nav-item"><span class="icon">🩺</span> Medical Records</a>
      <a href="providers.html"    class="nav-item"><span class="icon">👨‍⚕️</span> Care Providers</a>
      <div class="nav-section-label">Admin</div>
      <a href="staff.html"        class="nav-item"><span class="icon">🧑‍💼</span> Staff</a>
      <a href="donations.html"    class="nav-item"><span class="icon">💛</span> Donations</a>
    </nav>
  </div>

  <div class="main-content">
    <header class="topbar">
      <div class="topbar-title">📋 Adoption Applications</div>
      <div class="topbar-actions">
        <button class="btn btn-primary" onclick="openModal('addAppModal')">+ New Application</button>
      </div>
    </header>

    <main class="page-content">
      <div class="section-header">
        <div><h1>Applications</h1><p id="count-label">Loading…</p></div>
      </div>

      <!-- Status tabs -->
      <div class="filter-bar">
        <button class="filter-chip active" onclick="setStatus('')">All</button>
        <button class="filter-chip" onclick="setStatus('Pending')">⏳ Pending</button>
        <button class="filter-chip" onclick="setStatus('Approved')">✅ Approved</button>
        <button class="filter-chip" onclick="setStatus('Rejected')">❌ Rejected</button>
      </div>

      <!-- Kanban-style cards for Pending, or table for all -->
      <div id="app-container">
        <div class="loader"><div class="spinner"></div> Loading…</div>
      </div>
      <div id="pagination" class="pagination"></div>
    </main>
  </div>
</div>

<!-- New Application Modal -->
<div class="modal-overlay" id="addAppModal">
  <div class="modal">
    <div class="modal-header">
      <h3>📋 New Adoption Application</h3>
      <button class="modal-close" onclick="closeModal('addAppModal')">✕</button>
    </div>
    <div class="modal-body">
      <div class="form-grid">
        <div class="form-group"><label class="form-label">Application ID *</label><input class="form-input" id="na-id" placeholder="e.g. A006"/></div>
        <div class="form-group"><label class="form-label">Application Date</label><input class="form-input" id="na-date" type="date"/></div>
        <div class="form-group"><label class="form-label">Adopter ID *</label><input class="form-input" id="na-adopter" placeholder="e.g. AD001"/></div>
        <div class="form-group"><label class="form-label">Pet ID *</label><input class="form-input" id="na-pet" placeholder="e.g. P001"/></div>
        <div class="form-group full"><label class="form-label">Notes</label><textarea class="form-textarea" id="na-notes" placeholder="Any notes about the application…"></textarea></div>
      </div>
      <div id="pet-preview" style="margin-top:12px"></div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-outline" onclick="closeModal('addAppModal')">Cancel</button>
      <button class="btn btn-primary" onclick="submitApp()">Submit Application</button>
    </div>
  </div>
</div>

<div id="toast-container"></div>
<script src="js/api.js"></script>
<script>
let currentStatus = '', currentPage = 1, totalPages = 1;

function setStatus(s) {
  currentStatus = s;
  currentPage = 1;
  document.querySelectorAll('.filter-chip').forEach(c => c.classList.remove('active'));
  event.target.classList.add('active');
  loadApps();
}

async function loadApps() {
  const container = document.getElementById('app-container');
  container.innerHTML = '<div class="loader"><div class="spinner"></div> Loading…</div>';
  try {
    const params = new URLSearchParams({ page: currentPage, limit: 10 });
    if (currentStatus) params.append('status', currentStatus);
    const data = await API.get('/applications?' + params);
    totalPages = Math.ceil(data.total / 10);
    document.getElementById('count-label').textContent = `${data.total} application${data.total !== 1 ? 's' : ''}`;
    renderApps(data.applications);
    renderPagination();
  } catch (err) {
    container.innerHTML = `<div class="empty-state"><div class="empty-icon">⚠️</div><p>${err.message}</p></div>`;
  }
}

function renderApps(apps) {
  if (!apps.length) {
    document.getElementById('app-container').innerHTML = '<div class="empty-state"><div class="empty-icon">📋</div><h3>No applications found</h3><p>Try a different filter</p></div>';
    return;
  }
  document.getElementById('app-container').innerHTML = `
    <div class="table-container">
      <table>
        <thead>
          <tr>
            <th>ID</th>
            <th>Pet</th>
            <th>Adopter</th>
            <th>Date</th>
            <th>Status</th>
            <th>Notes</th>
            <th>Actions</th>
          </tr>
        </thead>
        <tbody>
          ${apps.map(a => `
            <tr>
              <td><strong>${a.application_id}</strong></td>
              <td>
                <strong>${a.pet_name}</strong>
                <br><small style="color:var(--text-mute)">${a.breed || '—'} · ${a.pet_id}</small>
              </td>
              <td>
                <strong>${a.adopter_name}</strong>
                <br><small style="color:var(--text-mute)">${a.phone}</small>
              </td>
              <td>${formatDate(a.application_date)}</td>
              <td>${statusBadge(a.status)}</td>
              <td style="max-width:180px;font-size:.82rem;color:var(--text-mute)">${a.notes || '—'}</td>
              <td>
                <div style="display:flex;gap:6px;flex-wrap:wrap">
                  ${a.status === 'Pending' ? `
                    <button class="btn btn-sm" style="background:var(--sage);color:#fff" onclick="updateStatus('${a.application_id}','Approved')">✅ Approve</button>
                    <button class="btn btn-danger btn-sm" onclick="updateStatus('${a.application_id}','Rejected')">❌ Reject</button>
                  ` : ''}
                  ${a.status === 'Approved' ? `<button class="btn btn-outline btn-sm" onclick="updateStatus('${a.application_id}','Pending')">↩ Revert</button>` : ''}
                  <button class="btn btn-danger btn-sm" onclick="deleteApp('${a.application_id}')">🗑</button>
                </div>
              </td>
            </tr>
          `).join('')}
        </tbody>
      </table>
    </div>
  `;
}

function renderPagination() {
  const el = document.getElementById('pagination');
  if (totalPages <= 1) { el.innerHTML = ''; return; }
  let html = '';
  if (currentPage > 1) html += `<button class="page-btn" onclick="goPage(${currentPage-1})">‹</button>`;
  for (let i = 1; i <= totalPages; i++) html += `<button class="page-btn ${i===currentPage?'active':''}" onclick="goPage(${i})">${i}</button>`;
  if (currentPage < totalPages) html += `<button class="page-btn" onclick="goPage(${currentPage+1})">›</button>`;
  el.innerHTML = html;
}
function goPage(p) { currentPage = p; loadApps(); }

async function updateStatus(id, status) {
  try {
    await API.patch('/applications/' + id + '/status', { status });
    showToast(`Application ${status}! ${status === 'Approved' ? '🎉 Pet status auto-updated to Adopted!' : ''}`, 'success');
    loadApps();
  } catch (err) { showToast(err.message, 'error'); }
}

async function deleteApp(id) {
  if (!confirm(`Delete application ${id}?`)) return;
  try {
    await API.delete('/applications/' + id);
    showToast('Application deleted', 'success');
    loadApps();
  } catch (err) { showToast(err.message, 'error'); }
}

async function submitApp() {
  const body = {
    application_id: document.getElementById('na-id').value.trim(),
    adopter_id:     document.getElementById('na-adopter').value.trim(),
    pet_id:         document.getElementById('na-pet').value.trim(),
    notes:          document.getElementById('na-notes').value.trim()
  };
  if (!body.application_id || !body.adopter_id || !body.pet_id) {
    showToast('Application ID, Adopter ID and Pet ID are required', 'error'); return;
  }
  try {
    await API.post('/applications', body);
    showToast('Application submitted! 📋', 'success');
    closeModal('addAppModal');
    loadApps();
  } catch (err) { showToast(err.message, 'error'); }
}

// Auto-set today's date
document.getElementById('na-date').value = new Date().toISOString().split('T')[0];

loadApps();
</script>
</body>
</html>
