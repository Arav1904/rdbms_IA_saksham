<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>Pets — Paws Shelter</title>
  <link rel="stylesheet" href="css/main.css"/>
</head>
<body>
<div class="app-shell">
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-logo">
      <div class="logo-icon">🐾</div>
      <h2><span>Paws</span> Shelter<br>System</h2>
    </div>
    <nav class="sidebar-nav">
      <div class="nav-section-label">Overview</div>
      <a href="index.html"        class="nav-item"><span class="icon">📊</span> Dashboard</a>
      <div class="nav-section-label">Animals</div>
      <a href="pets.html"         class="nav-item active"><span class="icon">🐾</span> All Pets</a>
      <a href="training.html"     class="nav-item"><span class="icon">🎓</span> Training</a>
      <div class="nav-section-label">Adoption</div>
      <a href="adopters.html"     class="nav-item"><span class="icon">👥</span> Adopters</a>
      <a href="applications.html" class="nav-item"><span class="icon">📋</span> Applications</a>
      <div class="nav-section-label">Care</div>
      <a href="appointments.html" class="nav-item"><span class="icon">📅</span> Appointments</a>
      <a href="medical.html"      class="nav-item"><span class="icon">🩺</span> Medical Records</a>
      <a href="providers.html"    class="nav-item"><span class="icon">👨‍⚕️</span> Care Providers</a>
      <div class="nav-section-label">Admin</div>
      <a href="staff.html"        class="nav-item"><span class="icon">🧑‍💼</span> Staff</a>
      <a href="donations.html"    class="nav-item"><span class="icon">💛</span> Donations</a>
    </nav>
  </div>

  <div class="main-content">
    <header class="topbar">
      <div class="topbar-title">🐾 All Pets</div>
      <div class="topbar-actions">
        <button class="btn btn-primary" onclick="openModal('addPetModal')">+ Add Pet</button>
      </div>
    </header>

    <main class="page-content">
      <div class="section-header">
        <div>
          <h1>Pet Registry</h1>
          <p id="count-label">Loading pets…</p>
        </div>
      </div>

      <!-- Filters -->
      <div class="filter-bar">
        <div class="search-box">
          <span>🔍</span>
          <input type="text" id="searchInput" placeholder="Search name or breed…" oninput="debounceLoad()"/>
        </div>
        <button class="filter-chip active" onclick="setFilter('status','')">All</button>
        <button class="filter-chip" onclick="setFilter('status','Available')">🟢 Available</button>
        <button class="filter-chip" onclick="setFilter('status','Adopted')">🔵 Adopted</button>
        <button class="filter-chip" onclick="setFilter('status','Reserved')">🟡 Reserved</button>
        <button class="filter-chip" onclick="setFilter('gender','Male')">♂ Male</button>
        <button class="filter-chip" onclick="setFilter('gender','Female')">♀ Female</button>
        <button class="filter-chip" onclick="clearFilters()">✕ Clear</button>
      </div>

      <!-- Grid -->
      <div class="grid-auto stagger" id="pets-grid">
        <div class="loader"><div class="spinner"></div> Loading pets…</div>
      </div>
      <div id="pagination" class="pagination"></div>
    </main>
  </div>
</div>

<!-- ── Add Pet Modal ─────────────────────────────────────────── -->
<div class="modal-overlay" id="addPetModal">
  <div class="modal">
    <div class="modal-header">
      <h3>🐾 Add New Pet</h3>
      <button class="modal-close" onclick="closeModal('addPetModal')">✕</button>
    </div>
    <div class="modal-body">
      <div class="form-grid">
        <div class="form-group">
          <label class="form-label">Pet ID *</label>
          <input class="form-input" id="ap-id" placeholder="e.g. P007" />
        </div>
        <div class="form-group">
          <label class="form-label">Name *</label>
          <input class="form-input" id="ap-name" placeholder="Pet's name" />
        </div>
        <div class="form-group">
          <label class="form-label">Breed</label>
          <input class="form-input" id="ap-breed" placeholder="e.g. Labrador" />
        </div>
        <div class="form-group">
          <label class="form-label">Age (years)</label>
          <input class="form-input" id="ap-age" type="number" min="0" placeholder="0" />
        </div>
        <div class="form-group">
          <label class="form-label">Gender</label>
          <select class="form-select" id="ap-gender">
            <option value="">Select</option>
            <option>Male</option>
            <option>Female</option>
          </select>
        </div>
        <div class="form-group">
          <label class="form-label">Weight (kg)</label>
          <input class="form-input" id="ap-weight" type="number" step="0.1" placeholder="0.0" />
        </div>
        <div class="form-group">
          <label class="form-label">Intake Date</label>
          <input class="form-input" id="ap-intake" type="date" />
        </div>
        <div class="form-group">
          <label class="form-label">Microchip ID</label>
          <input class="form-input" id="ap-chip" placeholder="MC00X" />
        </div>
        <div class="form-group">
          <label class="form-label">Animal Type</label>
          <select class="form-select" id="ap-type" onchange="toggleTypeFields()">
            <option value="">Select type</option>
            <option value="Dog">Dog</option>
            <option value="Cat">Cat</option>
            <option value="Other">Other Animal</option>
          </select>
        </div>
        <div class="form-group">
          <label class="form-label">Vaccinated?</label>
          <select class="form-select" id="ap-vacc">
            <option value="false">No</option>
            <option value="true">Yes</option>
          </select>
        </div>

        <!-- Dog fields -->
        <div class="form-group" id="dog-size" style="display:none">
          <label class="form-label">Size</label>
          <select class="form-select" id="ap-size">
            <option>Small</option><option>Medium</option><option>Large</option>
          </select>
        </div>
        <div class="form-group" id="dog-trained" style="display:none">
          <label class="form-label">Trained?</label>
          <select class="form-select" id="ap-trained">
            <option value="false">No</option><option value="true">Yes</option>
          </select>
        </div>

        <!-- Cat fields -->
        <div class="form-group" id="cat-indoor" style="display:none">
          <label class="form-label">Indoor?</label>
          <select class="form-select" id="ap-indoor">
            <option value="true">Yes</option><option value="false">No</option>
          </select>
        </div>
        <div class="form-group" id="cat-fur" style="display:none">
          <label class="form-label">Fur Length</label>
          <select class="form-select" id="ap-fur">
            <option>Short</option><option>Medium</option><option>Long</option>
          </select>
        </div>

        <!-- Other fields -->
        <div class="form-group full" id="other-species" style="display:none">
          <label class="form-label">Species Name *</label>
          <input class="form-input" id="ap-species" placeholder="e.g. Rabbit" />
        </div>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-outline" onclick="closeModal('addPetModal')">Cancel</button>
      <button class="btn btn-primary" onclick="addPet()">Add Pet</button>
    </div>
  </div>
</div>

<!-- ── Pet Detail Modal ──────────────────────────────────────── -->
<div class="modal-overlay" id="petDetailModal">
  <div class="modal" style="max-width:700px">
    <div class="modal-header">
      <h3 id="detail-title">Pet Details</h3>
      <button class="modal-close" onclick="closeModal('petDetailModal')">✕</button>
    </div>
    <div class="modal-body" id="detail-body"></div>
    <div class="modal-footer" id="detail-footer"></div>
  </div>
</div>

<!-- ── Edit Pet Modal ────────────────────────────────────────── -->
<div class="modal-overlay" id="editPetModal">
  <div class="modal">
    <div class="modal-header">
      <h3>✏️ Edit Pet</h3>
      <button class="modal-close" onclick="closeModal('editPetModal')">✕</button>
    </div>
    <div class="modal-body">
      <input type="hidden" id="ep-id"/>
      <div class="form-grid">
        <div class="form-group"><label class="form-label">Name</label><input class="form-input" id="ep-name"/></div>
        <div class="form-group"><label class="form-label">Breed</label><input class="form-input" id="ep-breed"/></div>
        <div class="form-group"><label class="form-label">Age</label><input class="form-input" type="number" id="ep-age"/></div>
        <div class="form-group"><label class="form-label">Weight (kg)</label><input class="form-input" type="number" step="0.1" id="ep-weight"/></div>
        <div class="form-group">
          <label class="form-label">Status</label>
          <select class="form-select" id="ep-status">
            <option>Available</option><option>Adopted</option><option>Reserved</option>
          </select>
        </div>
        <div class="form-group">
          <label class="form-label">Vaccinated?</label>
          <select class="form-select" id="ep-vacc">
            <option value="false">No</option><option value="true">Yes</option>
          </select>
        </div>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-outline" onclick="closeModal('editPetModal')">Cancel</button>
      <button class="btn btn-primary" onclick="savePet()">Save Changes</button>
    </div>
  </div>
</div>

<div id="toast-container"></div>
<script src="js/api.js"></script>
<script src="js/app.js"></script>
<script>
let currentPage = 1, totalPages = 1;
let filters = { status: '', gender: '', search: '' };
let debounceTimer;

function debounceLoad() {
  clearTimeout(debounceTimer);
  debounceTimer = setTimeout(() => { filters.search = document.getElementById('searchInput').value; currentPage = 1; loadPets(); }, 350);
}

function setFilter(key, val) {
  filters[key] = val;
  currentPage = 1;
  document.querySelectorAll('.filter-chip').forEach(c => c.classList.remove('active'));
  event.target.classList.add('active');
  loadPets();
}

function clearFilters() {
  filters = { status: '', gender: '', search: '' };
  document.getElementById('searchInput').value = '';
  document.querySelectorAll('.filter-chip').forEach(c => c.classList.remove('active'));
  document.querySelector('.filter-chip').classList.add('active');
  loadPets();
}

async function loadPets() {
  const grid = document.getElementById('pets-grid');
  grid.innerHTML = '<div class="loader"><div class="spinner"></div> Loading…</div>';
  try {
    const params = new URLSearchParams({ page: currentPage, limit: 12 });
    if (filters.status) params.append('status', filters.status);
    if (filters.gender) params.append('gender', filters.gender);
    if (filters.search) params.append('search', filters.search);
    const data = await API.get('/pets?' + params);
    totalPages = data.pages;
    document.getElementById('count-label').textContent = `${data.total} pet${data.total !== 1 ? 's' : ''} found`;
    renderGrid(data.pets);
    renderPagination();
  } catch (err) {
    grid.innerHTML = `<div class="empty-state"><div class="empty-icon">⚠️</div><h3>Error loading pets</h3><p>${err.message}</p></div>`;
  }
}

function renderGrid(pets) {
  const grid = document.getElementById('pets-grid');
  if (!pets.length) {
    grid.innerHTML = '<div class="empty-state" style="grid-column:1/-1"><div class="empty-icon">🐾</div><h3>No pets found</h3><p>Try adjusting your filters</p></div>';
    return;
  }
  grid.innerHTML = pets.map(p => `
    <div class="pet-card" onclick="viewPet('${p.pet_id}')">
      <div class="pet-card-img">
        <span style="font-size:4.5rem">${petEmoji(p)}</span>
        <span class="pet-status-badge badge-${p.adoption_status.toLowerCase()}">${p.adoption_status}</span>
      </div>
      <div class="pet-card-body">
        <div class="pet-card-name">${p.name}</div>
        <div class="pet-card-breed">${p.breed || 'Unknown breed'}</div>
        <div class="pet-card-tags">
          ${p.age !== null ? `<span class="tag">🎂 ${p.age}y</span>` : ''}
          ${p.gender ? `<span class="tag">${p.gender === 'Male' ? '♂' : '♀'} ${p.gender}</span>` : ''}
          ${p.weight_kg ? `<span class="tag">⚖️ ${p.weight_kg}kg</span>` : ''}
          ${p.is_vaccinated ? '<span class="tag">💉 Vaccinated</span>' : ''}
          ${p.size ? `<span class="tag">📏 ${p.size}</span>` : ''}
          ${p.fur_length ? `<span class="tag">🪮 ${p.fur_length}</span>` : ''}
        </div>
      </div>
    </div>
  `).join('');
}

function renderPagination() {
  const el = document.getElementById('pagination');
  if (totalPages <= 1) { el.innerHTML = ''; return; }
  let html = '';
  if (currentPage > 1) html += `<button class="page-btn" onclick="goPage(${currentPage-1})">‹</button>`;
  for (let i = 1; i <= totalPages; i++) {
    html += `<button class="page-btn ${i===currentPage?'active':''}" onclick="goPage(${i})">${i}</button>`;
  }
  if (currentPage < totalPages) html += `<button class="page-btn" onclick="goPage(${currentPage+1})">›</button>`;
  el.innerHTML = html;
}

function goPage(p) { currentPage = p; loadPets(); window.scrollTo(0,0); }

async function viewPet(id) {
  openModal('petDetailModal');
  document.getElementById('detail-body').innerHTML = '<div class="loader"><div class="spinner"></div></div>';
  try {
    const p = await API.get('/pets/' + id);
    document.getElementById('detail-title').textContent = `${petEmoji(p)} ${p.name}`;
    document.getElementById('detail-body').innerHTML = `
      <div style="display:flex;gap:20px;margin-bottom:20px;align-items:flex-start">
        <div style="width:100px;height:100px;border-radius:16px;background:linear-gradient(135deg,var(--sage-light),var(--sky-light));display:flex;align-items:center;justify-content:center;font-size:3rem;flex-shrink:0">${petEmoji(p)}</div>
        <div>
          <h2 style="font-family:var(--font-display);font-size:1.6rem;color:var(--brown-dark)">${p.name}</h2>
          <p style="color:var(--text-mute)">${p.breed || ''} · ${p.shelter_name || ''}</p>
          <div style="margin-top:8px">${statusBadge(p.adoption_status)}</div>
        </div>
      </div>
      <div class="detail-grid" style="margin-bottom:20px">
        <div class="detail-item"><label>Pet ID</label><span>${p.pet_id}</span></div>
        <div class="detail-item"><label>Age</label><span>${p.age !== null ? p.age + ' years' : '—'}</span></div>
        <div class="detail-item"><label>Gender</label><span>${p.gender || '—'}</span></div>
        <div class="detail-item"><label>Weight</label><span>${p.weight_kg ? p.weight_kg + ' kg' : '—'}</span></div>
        <div class="detail-item"><label>Intake Date</label><span>${formatDate(p.intake_date)}</span></div>
        <div class="detail-item"><label>Vaccinated</label><span>${p.is_vaccinated ? '✅ Yes' : '❌ No'}</span></div>
        <div class="detail-item"><label>Microchip</label><span>${p.microchip_id || '—'}</span></div>
        ${p.size ? `<div class="detail-item"><label>Size</label><span>${p.size}</span></div>` : ''}
        ${p.is_trained !== undefined && p.size ? `<div class="detail-item"><label>Trained</label><span>${p.is_trained ? 'Yes' : 'No'}</span></div>` : ''}
        ${p.fur_length ? `<div class="detail-item"><label>Fur Length</label><span>${p.fur_length}</span></div>` : ''}
        ${p.is_indoor !== undefined && p.fur_length ? `<div class="detail-item"><label>Indoor</label><span>${p.is_indoor ? 'Yes' : 'No'}</span></div>` : ''}
        ${p.species_name ? `<div class="detail-item"><label>Species</label><span>${p.species_name}</span></div>` : ''}
      </div>
      ${p.medical_records?.length ? `
        <div class="card-title" style="margin-bottom:10px">🩺 Medical History</div>
        ${p.medical_records.map(r => `
          <div style="padding:12px;background:var(--cream);border-radius:10px;margin-bottom:8px;font-size:.85rem">
            <strong>${formatDate(r.record_date)}</strong> — ${r.diagnosis || '—'}
            <br><span style="color:var(--text-mute)">${r.treatment || ''} ${r.vet_name ? '· Dr. '+r.vet_name : ''}</span>
          </div>`).join('')}` : ''}
      ${p.appointments?.length ? `
        <div class="card-title" style="margin:16px 0 10px">📅 Appointments</div>
        ${p.appointments.map(a => `
          <div style="padding:12px;background:var(--cream);border-radius:10px;margin-bottom:8px;font-size:.85rem">
            <strong>${formatDate(a.appointment_date)}</strong> — ${a.service_type}
            <br><span style="color:var(--text-mute)">${a.provider_name} · ${a.duration_mins || '?'} mins</span>
          </div>`).join('')}` : ''}
    `;
    document.getElementById('detail-footer').innerHTML = `
      <button class="btn btn-outline" onclick="closeModal('petDetailModal')">Close</button>
      <button class="btn btn-amber" onclick="openEdit(${JSON.stringify(p).replace(/"/g,'&quot;')})">✏️ Edit</button>
      <button class="btn btn-danger" onclick="deletePet('${p.pet_id}')">🗑 Delete</button>
    `;
  } catch (err) {
    document.getElementById('detail-body').innerHTML = `<div class="empty-state"><div class="empty-icon">⚠️</div><p>${err.message}</p></div>`;
  }
}

function openEdit(p) {
  closeModal('petDetailModal');
  document.getElementById('ep-id').value = p.pet_id;
  document.getElementById('ep-name').value = p.name;
  document.getElementById('ep-breed').value = p.breed || '';
  document.getElementById('ep-age').value = p.age || '';
  document.getElementById('ep-weight').value = p.weight_kg || '';
  document.getElementById('ep-status').value = p.adoption_status;
  document.getElementById('ep-vacc').value = p.is_vaccinated ? 'true' : 'false';
  openModal('editPetModal');
}

async function savePet() {
  const id = document.getElementById('ep-id').value;
  try {
    await API.put('/pets/' + id, {
      name: document.getElementById('ep-name').value,
      breed: document.getElementById('ep-breed').value,
      age: document.getElementById('ep-age').value,
      weight_kg: document.getElementById('ep-weight').value,
      adoption_status: document.getElementById('ep-status').value,
      is_vaccinated: document.getElementById('ep-vacc').value === 'true'
    });
    showToast('Pet updated successfully!', 'success');
    closeModal('editPetModal');
    loadPets();
  } catch (err) { showToast(err.message, 'error'); }
}

async function deletePet(id) {
  if (!confirm(`Delete pet ${id}? This cannot be undone.`)) return;
  try {
    await API.delete('/pets/' + id);
    showToast('Pet deleted', 'success');
    closeModal('petDetailModal');
    loadPets();
  } catch (err) { showToast(err.message, 'error'); }
}

function toggleTypeFields() {
  const type = document.getElementById('ap-type').value;
  document.getElementById('dog-size').style.display    = type === 'Dog' ? '' : 'none';
  document.getElementById('dog-trained').style.display = type === 'Dog' ? '' : 'none';
  document.getElementById('cat-indoor').style.display  = type === 'Cat' ? '' : 'none';
  document.getElementById('cat-fur').style.display     = type === 'Cat' ? '' : 'none';
  document.getElementById('other-species').style.display = type === 'Other' ? '' : 'none';
}

async function addPet() {
  const body = {
    pet_id: document.getElementById('ap-id').value.trim(),
    name: document.getElementById('ap-name').value.trim(),
    breed: document.getElementById('ap-breed').value.trim(),
    age: document.getElementById('ap-age').value || null,
    gender: document.getElementById('ap-gender').value,
    weight_kg: document.getElementById('ap-weight').value || null,
    intake_date: document.getElementById('ap-intake').value || null,
    microchip_id: document.getElementById('ap-chip').value.trim() || null,
    is_vaccinated: document.getElementById('ap-vacc').value === 'true',
    shelter_id: 'SH001',
    type: document.getElementById('ap-type').value,
    size: document.getElementById('ap-size').value,
    is_trained: document.getElementById('ap-trained').value === 'true',
    is_indoor: document.getElementById('ap-indoor').value === 'true',
    fur_length: document.getElementById('ap-fur').value,
    species_name: document.getElementById('ap-species').value.trim()
  };
  if (!body.pet_id || !body.name) { showToast('Pet ID and Name are required', 'error'); return; }
  try {
    await API.post('/pets', body);
    showToast('Pet added successfully! 🐾', 'success');
    closeModal('addPetModal');
    loadPets();
  } catch (err) { showToast(err.message, 'error'); }
}

loadPets();
</script>
</body>
</html>
