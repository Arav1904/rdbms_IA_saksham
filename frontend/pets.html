<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>All Pets — Paws Shelter</title>
  <meta name="description" content="Browse and manage all pets at Paws Shelter — search, filter, add, and edit pet records."/>
  <link rel="stylesheet" href="css/main.css"/>
</head>
<body>
<div class="app-shell">
  <aside class="sidebar" id="sidebar"></aside>

  <div class="main-content">
    <header class="topbar">
      <div class="topbar-title">All Pets</div>
      <div class="topbar-actions">
        <button class="btn btn-primary" onclick="openModal('addPetModal')">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
          Add Pet
        </button>
      </div>
    </header>

    <main class="page-content">
      <div class="section-header">
        <div>
          <h1>Pet Registry</h1>
          <p id="count-label">Loading pets…</p>
        </div>
      </div>

      <!-- Showcase images of actual shelter pets -->
      <div style="display:flex;gap:16px;margin-bottom:24px;align-items:stretch">
        <div style="flex:1;border-radius:16px;overflow:hidden;max-height:160px;box-shadow:var(--sh-sm)">
          <img src="images/dog_buddy.png" alt="Buddy the Labrador" style="width:100%;height:100%;object-fit:cover;object-position:center 30%"/>
        </div>
        <div style="flex:0.8;border-radius:16px;overflow:hidden;max-height:160px;box-shadow:var(--sh-sm)">
          <img src="images/cat_whiskers.png" alt="Whiskers the Persian Cat" style="width:100%;height:100%;object-fit:cover"/>
        </div>
        <div style="flex:1.1;border-radius:16px;overflow:hidden;max-height:160px;box-shadow:var(--sh-sm)">
          <img src="images/hero_pets.png" alt="Shelter pets" style="width:100%;height:100%;object-fit:cover;object-position:center 35%"/>
        </div>
      </div>

      <!-- Filters -->
      <div class="filter-bar">
        <div class="search-box">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
          <input type="text" id="searchInput" placeholder="Search name or breed…" oninput="debounceLoad()"/>
        </div>
        <button class="filter-chip active" onclick="setFilter('status','',this)">All</button>
        <button class="filter-chip" onclick="setFilter('status','Available',this)">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><polyline points="20 6 9 17 4 12"/></svg>
          Available
        </button>
        <button class="filter-chip" onclick="setFilter('status','Adopted',this)">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>
          Adopted
        </button>
        <button class="filter-chip" onclick="setFilter('status','Reserved',this)">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
          Reserved
        </button>
        <button class="filter-chip" onclick="setFilter('gender','Male',this)"> Male</button>
        <button class="filter-chip" onclick="setFilter('gender','Female',this)"> Female</button>
        <button class="filter-chip" onclick="clearFilters()">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
          Clear
        </button>
      </div>

      <!-- Pet Grid -->
      <div class="grid-auto stagger" id="pets-grid">
        <div class="loader"><div class="spinner"></div> Loading pets…</div>
      </div>
      <div id="pagination" class="pagination"></div>
    </main>
  </div>
</div>

<!-- ── Add Pet Modal ─────────────────────────────────────────── -->
<div class="modal-overlay" id="addPetModal">
  <div class="modal">
    <div class="modal-header">
      <h3>
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="13" r="4"/><circle cx="5" cy="9" r="2"/><circle cx="19" cy="9" r="2"/><circle cx="8" cy="5" r="2"/><circle cx="16" cy="5" r="2"/></svg>
        Add New Pet
      </h3>
      <button class="modal-close" onclick="closeModal('addPetModal')">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>
    </div>
    <div class="modal-body">
      <div class="form-grid">
        <div class="form-group">
          <label class="form-label">Pet ID *</label>
          <input class="form-input" id="ap-id" placeholder="e.g. P007"/>
        </div>
        <div class="form-group">
          <label class="form-label">Name *</label>
          <input class="form-input" id="ap-name" placeholder="Pet's name"/>
        </div>
        <div class="form-group">
          <label class="form-label">Breed</label>
          <input class="form-input" id="ap-breed" placeholder="e.g. Labrador"/>
        </div>
        <div class="form-group">
          <label class="form-label">Age (years)</label>
          <input class="form-input" id="ap-age" type="number" min="0" placeholder="0"/>
        </div>
        <div class="form-group">
          <label class="form-label">Gender</label>
          <select class="form-select" id="ap-gender">
            <option value="">Select</option>
            <option>Male</option>
            <option>Female</option>
          </select>
        </div>
        <div class="form-group">
          <label class="form-label">Weight (kg)</label>
          <input class="form-input" id="ap-weight" type="number" step="0.1" placeholder="0.0"/>
        </div>
        <div class="form-group">
          <label class="form-label">Intake Date</label>
          <input class="form-input" id="ap-intake" type="date"/>
        </div>
        <div class="form-group">
          <label class="form-label">Animal Type</label>
          <select class="form-select" id="ap-type" onchange="toggleTypeFields()">
            <option value="">Select type</option>
            <option value="Dog">Dog</option>
            <option value="Cat">Cat</option>
            <option value="Other">Other Animal</option>
          </select>
        </div>
        <div class="form-group">
          <label class="form-label">Vaccinated?</label>
          <select class="form-select" id="ap-vacc">
            <option value="false">No</option>
            <option value="true">Yes</option>
          </select>
        </div>

        <!-- Dog fields -->
        <div class="form-group" id="dog-size" style="display:none">
          <label class="form-label">Size</label>
          <select class="form-select" id="ap-size">
            <option>Small</option><option>Medium</option><option>Large</option>
          </select>
        </div>
        <div class="form-group" id="dog-trained" style="display:none">
          <label class="form-label">Trained?</label>
          <select class="form-select" id="ap-trained">
            <option value="false">No</option><option value="true">Yes</option>
          </select>
        </div>

        <!-- Cat fields -->
        <div class="form-group" id="cat-indoor" style="display:none">
          <label class="form-label">Indoor?</label>
          <select class="form-select" id="ap-indoor">
            <option value="true">Yes</option><option value="false">No</option>
          </select>
        </div>
        <div class="form-group" id="cat-fur" style="display:none">
          <label class="form-label">Fur Length</label>
          <select class="form-select" id="ap-fur">
            <option>Short</option><option>Medium</option><option>Long</option>
          </select>
        </div>

        <!-- Other fields -->
        <div class="form-group full" id="other-species" style="display:none">
          <label class="form-label">Species Name *</label>
          <input class="form-input" id="ap-species" placeholder="e.g. Rabbit"/>
        </div>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-outline" onclick="closeModal('addPetModal')">Cancel</button>
      <button class="btn btn-primary" onclick="addPet()">Add Pet</button>
    </div>
  </div>
</div>

<!-- ── Pet Detail Modal ──────────────────────────────────────── -->
<div class="modal-overlay" id="petDetailModal">
  <div class="modal" style="max-width:680px">
    <div class="modal-header">
      <h3 id="detail-title">Pet Details</h3>
      <button class="modal-close" onclick="closeModal('petDetailModal')">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>
    </div>
    <div class="modal-body" id="detail-body"></div>
    <div class="modal-footer" id="detail-footer"></div>
  </div>
</div>

<!-- ── Edit Pet Modal ────────────────────────────────────────── -->
<div class="modal-overlay" id="editPetModal">
  <div class="modal">
    <div class="modal-header">
      <h3>
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
        Edit Pet
      </h3>
      <button class="modal-close" onclick="closeModal('editPetModal')">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>
    </div>
    <div class="modal-body">
      <input type="hidden" id="ep-id"/>
      <div class="form-grid">
        <div class="form-group"><label class="form-label">Name</label><input class="form-input" id="ep-name"/></div>
        <div class="form-group"><label class="form-label">Breed</label><input class="form-input" id="ep-breed"/></div>
        <div class="form-group"><label class="form-label">Age</label><input class="form-input" type="number" id="ep-age"/></div>
        <div class="form-group"><label class="form-label">Weight (kg)</label><input class="form-input" type="number" step="0.1" id="ep-weight"/></div>
        <div class="form-group">
          <label class="form-label">Status</label>
          <select class="form-select" id="ep-status">
            <option>Available</option><option>Adopted</option><option>Reserved</option>
          </select>
        </div>
        <div class="form-group">
          <label class="form-label">Vaccinated?</label>
          <select class="form-select" id="ep-vacc">
            <option value="false">No</option><option value="true">Yes</option>
          </select>
        </div>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-outline" onclick="closeModal('editPetModal')">Cancel</button>
      <button class="btn btn-primary" onclick="savePet()">Save Changes</button>
    </div>
  </div>
</div>

<!-- Before & After Update Modal -->
<div class="modal-overlay" id="beforeAfterModal">
  <div class="modal" style="max-width: 600px;">
    <div class="modal-header">
      <h3>Update Successful</h3>
      <button class="modal-close" onclick="closeModal('beforeAfterModal')">✕</button>
    </div>
    <div class="modal-body" id="ba-content">
      <!-- Injected before/after table -->
    </div>
    <div class="modal-footer">
      <button class="btn btn-primary" onclick="closeModal('beforeAfterModal')">Acknowledge</button>
    </div>
  </div>
</div>

<!-- Delete Confirmation Modal -->
<div class="modal-overlay" id="deleteConfirmModal">
  <div class="modal">
    <div class="modal-header">
      <h3>Deletion Confirmed</h3>
      <button class="modal-close" onclick="closeModal('deleteConfirmModal')">✕</button>
    </div>
    <div class="modal-body" id="dc-content">
      <!-- Injected delete confirmation -->
    </div>
    <div class="modal-footer">
      <button class="btn btn-danger" onclick="closeModal('deleteConfirmModal')">Close</button>
    </div>
  </div>
</div>

<div id="toast-container"></div>
<script src="js/api.js"></script>
<script src="js/app.js"></script>
<script>
let currentPage = 1, totalPages = 1;
let filters = { status: '', gender: '', search: '' };
let debounceTimer;

function petEmoji(p) {
  if (p.size !== undefined || p.is_trained !== undefined) return '🐶';
  if (p.fur_length !== undefined || p.is_indoor !== undefined) return '🐱';
  return '🐾';
}

function petTypeClass(p) {
  if (p.size !== undefined || p.is_trained !== undefined) return 'dog';
  if (p.fur_length !== undefined || p.is_indoor !== undefined) return 'cat';
  return 'other';
}

function debounceLoad() {
  clearTimeout(debounceTimer);
  debounceTimer = setTimeout(() => {
    filters.search = document.getElementById('searchInput').value;
    currentPage = 1;
    loadPets();
  }, 350);
}

function setFilter(key, val, btn) {
  filters[key] = val;
  currentPage = 1;
  document.querySelectorAll('.filter-chip').forEach(c => c.classList.remove('active'));
  if (btn) btn.classList.add('active');
  loadPets();
}

function clearFilters() {
  filters = { status: '', gender: '', search: '' };
  document.getElementById('searchInput').value = '';
  document.querySelectorAll('.filter-chip').forEach(c => c.classList.remove('active'));
  document.querySelector('.filter-chip').classList.add('active');
  loadPets();
}

async function loadPets() {
  const grid = document.getElementById('pets-grid');
  grid.innerHTML = '<div class="loader"><div class="spinner"></div> Loading…</div>';
  try {
    const params = new URLSearchParams({ page: currentPage, limit: 12 });
    if (filters.status) params.append('status', filters.status);
    if (filters.gender) params.append('gender', filters.gender);
    if (filters.search) params.append('search', filters.search);
    const data = await API.get('/pets?' + params);
    totalPages = data.pages;
    document.getElementById('count-label').textContent =
      `${data.total} pet${data.total !== 1 ? 's' : ''} found`;
    renderGrid(data.pets);
    renderPagination();
  } catch (err) {
    grid.innerHTML = `<div class="empty-state" style="grid-column:1/-1">
      <div class="empty-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg></div>
      <h3>Could not load pets</h3><p>${err.message}</p></div>`;
  }
}

function renderGrid(pets) {
  const grid = document.getElementById('pets-grid');
  if (!pets.length) {
    grid.innerHTML = `<div class="empty-state" style="grid-column:1/-1">
      <div class="empty-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="13" r="4"/><circle cx="5" cy="9" r="2"/><circle cx="19" cy="9" r="2"/></svg></div>
      <h3>No pets found</h3>
      <p>Try adjusting your filters or add a new pet</p></div>`;
    return;
  }
  grid.innerHTML = pets.map(p => {
    const typeClass = petTypeClass(p);
    const imgHTML = `<span class="fallback-emoji">${petEmoji(p)}</span>`;
    return `
      <div class="pet-card" onclick="viewPet('${p.pet_id}')">
        <div class="pet-card-img ${typeClass}">
          ${imgHTML}
          <span class="pet-status-badge badge-${p.adoption_status.toLowerCase()}">${p.adoption_status}</span>
        </div>
        <div class="pet-card-body">
          <div class="pet-card-name">${p.name}</div>
          <div class="pet-card-breed">${p.breed || 'Unknown breed'}</div>
          <div class="pet-card-tags">
            ${p.age !== null ? `<span class="tag"> ${p.age}y</span>` : ''}
            ${p.gender ? `<span class="tag">${p.gender === 'Male' ? '' : ''} ${p.gender}</span>` : ''}
            ${p.weight_kg ? `<span class="tag"> ${p.weight_kg}kg</span>` : ''}
            ${p.is_vaccinated ? '<span class="tag"> Vaccinated</span>' : ''}
            ${p.size ? `<span class="tag"> ${p.size}</span>` : ''}
            ${p.fur_length ? `<span class="tag"> ${p.fur_length}</span>` : ''}
          </div>
        </div>
      </div>`;
  }).join('');
}

function renderPagination() {
  const el = document.getElementById('pagination');
  if (totalPages <= 1) { el.innerHTML = ''; return; }
  let html = '';
  if (currentPage > 1) html += `<button class="page-btn" onclick="goPage(${currentPage-1})">‹</button>`;
  for (let i = 1; i <= totalPages; i++) {
    html += `<button class="page-btn ${i===currentPage?'active':''}" onclick="goPage(${i})">${i}</button>`;
  }
  if (currentPage < totalPages) html += `<button class="page-btn" onclick="goPage(${currentPage+1})">›</button>`;
  el.innerHTML = html;
}

function goPage(p) { currentPage = p; loadPets(); window.scrollTo(0,0); }

async function viewPet(id) {
  openModal('petDetailModal');
  document.getElementById('detail-body').innerHTML = '<div class="loader"><div class="spinner"></div></div>';
  try {
    const p = await API.get('/pets/' + id);
    document.getElementById('detail-title').textContent = `${petEmoji(p)} ${p.name}`;
    document.getElementById('detail-body').innerHTML = `
      <div style="display:flex;gap:20px;margin-bottom:20px;align-items:flex-start">
        <div style="width:110px;height:110px;border-radius:16px;overflow:hidden;flex-shrink:0;box-shadow:var(--sh-sm)">
          <div style="width:100%;height:100%;background:linear-gradient(135deg,var(--sage-light),var(--sky-light));display:flex;align-items:center;justify-content:center;font-size:3rem">${petEmoji(p)}</div>
        </div>
        <div>
          <h2 style="font-family:var(--font-display);font-size:1.6rem;color:var(--brown-dark)">${p.name}</h2>
          <p style="color:var(--text-mute);margin-top:2px">${p.breed || ''} ${p.shelter_name ? '· ' + p.shelter_name : ''}</p>
          <div style="margin-top:10px">${statusBadge(p.adoption_status)}</div>
        </div>
      </div>
      <div class="detail-grid" style="margin-bottom:20px">
        <div class="detail-item"><label>Pet ID</label><span>${p.pet_id}</span></div>
        <div class="detail-item"><label>Age</label><span>${p.age !== null ? p.age + ' years' : '—'}</span></div>
        <div class="detail-item"><label>Gender</label><span>${p.gender || '—'}</span></div>
        <div class="detail-item"><label>Weight</label><span>${p.weight_kg ? p.weight_kg + ' kg' : '—'}</span></div>
        <div class="detail-item"><label>Intake Date</label><span>${formatDate(p.intake_date)}</span></div>
        <div class="detail-item"><label>Vaccinated</label><span>${p.is_vaccinated ? ' Yes' : ' No'}</span></div>
        ${p.size ? `<div class="detail-item"><label>Size</label><span>${p.size}</span></div>` : ''}
        ${p.is_trained !== undefined && p.size ? `<div class="detail-item"><label>Trained</label><span>${p.is_trained ? 'Yes' : 'No'}</span></div>` : ''}
        ${p.fur_length ? `<div class="detail-item"><label>Fur Length</label><span>${p.fur_length}</span></div>` : ''}
        ${p.is_indoor !== undefined && p.fur_length ? `<div class="detail-item"><label>Indoor</label><span>${p.is_indoor ? 'Yes' : 'No'}</span></div>` : ''}
        ${p.species_name ? `<div class="detail-item"><label>Species</label><span>${p.species_name}</span></div>` : ''}
      </div>

      ${p.appointments?.length ? `
        <div class="section-divider">Appointments</div>
        ${p.appointments.map(a => `
          <div style="padding:12px;background:var(--cream);border-radius:10px;margin-bottom:8px;font-size:.85rem">
            <strong>${formatDate(a.appointment_date)}</strong> — ${a.service_type}
            <br><span style="color:var(--text-mute)">${a.provider_name} · ${a.duration_mins || '?'} mins</span>
          </div>`).join('')}` : ''}
    `;
    document.getElementById('detail-footer').innerHTML = `
      <button class="btn btn-outline" onclick="closeModal('petDetailModal')">Close</button>
      <button class="btn btn-amber" onclick="openEdit(${JSON.stringify(p).replace(/"/g,'&quot;')})">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
        Edit
      </button>
      <button class="btn btn-danger" onclick="deletePet('${p.pet_id}')">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/></svg>
        Delete
      </button>
    `;
  } catch (err) {
    document.getElementById('detail-body').innerHTML =
      `<div class="empty-state"><div class="empty-icon"></div><p>${err.message}</p></div>`;
  }
}

function openEdit(p) {
  closeModal('petDetailModal');
  document.getElementById('ep-id').value    = p.pet_id;
  document.getElementById('ep-name').value  = p.name;
  document.getElementById('ep-breed').value = p.breed || '';
  document.getElementById('ep-age').value   = p.age || '';
  document.getElementById('ep-weight').value= p.weight_kg || '';
  document.getElementById('ep-status').value= p.adoption_status;
  document.getElementById('ep-vacc').value  = p.is_vaccinated ? 'true' : 'false';
  openModal('editPetModal');
}

async function savePet() {
  const id = document.getElementById('ep-id').value;
  try {
    const res = await API.put('/pets/' + id, {
      name:             document.getElementById('ep-name').value,
      breed:            document.getElementById('ep-breed').value,
      age:              document.getElementById('ep-age').value,
      weight_kg:        document.getElementById('ep-weight').value,
      adoption_status:  document.getElementById('ep-status').value,
      is_vaccinated:    document.getElementById('ep-vacc').value === 'true'
    });
    closeModal('editPetModal');
    
    // Display Before & After Update (Lab Requirement)
    let b = res.beforeUpdate || {};
    let a = res.afterUpdate || {};
    let html = `
      <p style="margin-bottom: 10px;">The record for <strong>${id}</strong> was successfully updated.</p>
      <table style="width: 100%; border-collapse: collapse; margin-top: 10px; font-size: 0.9rem;">
        <tr style="background: var(--cream); border-bottom: 2px solid #ddd;">
          <th style="padding: 10px; text-align: left;">Field</th>
          <th style="padding: 10px; text-align: left;">Before Update</th>
          <th style="padding: 10px; text-align: left;">After Update</th>
        </tr>
    `;
    const fields = ['name', 'breed', 'age', 'weight_kg', 'adoption_status', 'is_vaccinated'];
    fields.forEach(f => {
      const beforeVal = String(b[f] !== null ? b[f] : '—');
      const afterVal  = String(a[f] !== null ? a[f] : '—');
      const changed   = beforeVal !== afterVal;
      const highlight = changed ? 'font-weight:bold; color:var(--moss-dark); background:#dff0d8;' : '';
      
      html += `
        <tr style="border-bottom: 1px solid #eee;">
          <td style="padding: 8px;"><strong>${f}</strong></td>
          <td style="padding: 8px; color: #666;">${beforeVal}</td>
          <td style="padding: 8px; ${highlight}">${afterVal}</td>
        </tr>
      `;
    });
    html += `</table>`;
    
    document.getElementById('ba-content').innerHTML = html;
    openModal('beforeAfterModal');
    loadPets();
  } catch (err) { showToast(err.message, 'error'); }
}

async function deletePet(id) {
  if (!confirm(`Delete pet ${id}? This action cannot be undone.`)) return;
  try {
    await API.delete('/pets/' + id);
    closeModal('petDetailModal');
    
    // Display Confirmation after deletion (Lab Requirement)
    document.getElementById('dc-content').innerHTML = `
      <div style="padding: 20px 0; text-align: center;">
        <svg viewBox="0 0 24 24" fill="none" stroke="var(--danger)" stroke-width="2" style="width:50px; height:50px; margin-bottom:15px;"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/></svg>
        <p style="font-size: 1.1rem;">Record <strong>${id}</strong> has been fully deleted from the database.</p>
        <p style="color: var(--text-mute); font-size: 0.9rem; margin-top: 10px;">All related cascading links (appointments, etc.) have been removed automatically.</p>
      </div>
    `;
    openModal('deleteConfirmModal');
    loadPets();
  } catch (err) { showToast(err.message, 'error'); }
}

function toggleTypeFields() {
  const type = document.getElementById('ap-type').value;
  document.getElementById('dog-size').style.display     = type === 'Dog'   ? '' : 'none';
  document.getElementById('dog-trained').style.display  = type === 'Dog'   ? '' : 'none';
  document.getElementById('cat-indoor').style.display   = type === 'Cat'   ? '' : 'none';
  document.getElementById('cat-fur').style.display      = type === 'Cat'   ? '' : 'none';
  document.getElementById('other-species').style.display= type === 'Other' ? '' : 'none';
}

async function addPet() {
  const body = {
    pet_id:       document.getElementById('ap-id').value.trim(),
    name:         document.getElementById('ap-name').value.trim(),
    breed:        document.getElementById('ap-breed').value.trim(),
    age:          document.getElementById('ap-age').value || null,
    gender:       document.getElementById('ap-gender').value,
    weight_kg:    document.getElementById('ap-weight').value || null,
    intake_date:  document.getElementById('ap-intake').value || null,
    is_vaccinated:document.getElementById('ap-vacc').value === 'true',
    shelter_id:   'SH001',
    type:         document.getElementById('ap-type').value,
    size:         document.getElementById('ap-size').value,
    is_trained:   document.getElementById('ap-trained').value === 'true',
    is_indoor:    document.getElementById('ap-indoor').value === 'true',
    fur_length:   document.getElementById('ap-fur').value,
    species_name: document.getElementById('ap-species').value.trim(),
  };
  if (!body.pet_id || !body.name) { showToast('Pet ID and Name are required', 'error'); return; }
  try {
    await API.post('/pets', body);
    showToast('Pet added successfully! ', 'success');
    closeModal('addPetModal');
    loadPets();
  } catch (err) { showToast(err.message, 'error'); }
}

loadPets();
</script>
</body>
