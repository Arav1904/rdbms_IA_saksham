<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>Training — Paws Shelter</title>
  <link rel="stylesheet" href="css/main.css"/>
</head>
<body>
<div class="app-shell">
  <aside class="sidebar">
    <div class="sidebar-logo"><div class="logo-icon">🐾</div><h2><span>Paws</span> Shelter<br>System</h2></div>
    <nav class="sidebar-nav">
      <div class="nav-section-label">Overview</div>
      <a href="index.html"        class="nav-item"><span class="icon">📊</span> Dashboard</a>
      <div class="nav-section-label">Animals</div>
      <a href="pets.html"         class="nav-item"><span class="icon">🐾</span> All Pets</a>
      <a href="training.html"     class="nav-item active"><span class="icon">🎓</span> Training</a>
      <div class="nav-section-label">Adoption</div>
      <a href="adopters.html"     class="nav-item"><span class="icon">👥</span> Adopters</a>
      <a href="applications.html" class="nav-item"><span class="icon">📋</span> Applications</a>
      <div class="nav-section-label">Care</div>
      <a href="appointments.html" class="nav-item"><span class="icon">📅</span> Appointments</a>
      <a href="medical.html"      class="nav-item"><span class="icon">🩺</span> Medical Records</a>
      <a href="providers.html"    class="nav-item"><span class="icon">👨‍⚕️</span> Care Providers</a>
      <div class="nav-section-label">Admin</div>
      <a href="staff.html"        class="nav-item"><span class="icon">🧑‍💼</span> Staff</a>
      <a href="donations.html"    class="nav-item"><span class="icon">💛</span> Donations</a>
    </nav>
  </aside>

  <div class="main-content">
    <header class="topbar">
      <div class="topbar-title">🎓 Training Programs</div>
    </header>

    <main class="page-content">
      <div class="section-header">
        <div><h1>Dog Training Programs</h1><p>Obedience & agility training for shelter dogs</p></div>
      </div>

      <div id="programs-container">
        <div class="loader"><div class="spinner"></div> Loading…</div>
      </div>
    </main>
  </div>
</div>

<div id="toast-container"></div>
<script src="js/api.js"></script>
<script>
async function loadTraining() {
  const container = document.getElementById('programs-container');
  try {
    const programs = await API.get('/training');
    if (!programs.length) {
      container.innerHTML = '<div class="empty-state"><div class="empty-icon">🎓</div><h3>No programs found</h3></div>';
      return;
    }

    container.innerHTML = '<div class="grid-auto stagger" id="program-cards"></div>';
    const grid = document.getElementById('program-cards');

    for (const prog of programs) {
      const dogs = await API.get('/training/' + prog.program_id + '/dogs');
      const card = document.createElement('div');
      card.className = 'card';
      card.innerHTML = `
        <div style="display:flex;align-items:center;gap:14px;margin-bottom:16px">
          <div style="width:56px;height:56px;border-radius:14px;background:linear-gradient(135deg,rgba(232,150,12,.2),rgba(122,158,126,.2));display:flex;align-items:center;justify-content:center;font-size:1.8rem">🎓</div>
          <div>
            <div style="font-family:var(--font-display);font-size:1.1rem;color:var(--brown-dark)">${prog.program_name}</div>
            <div style="font-size:.82rem;color:var(--text-mute)">Trainer: ${prog.trainer_name || '—'}</div>
          </div>
        </div>
        <div class="detail-grid" style="gap:10px;margin-bottom:16px">
          <div class="detail-item"><label>Program ID</label><span>${prog.program_id}</span></div>
          <div class="detail-item"><label>Duration</label><span>${prog.duration_weeks} week${prog.duration_weeks !== 1 ? 's' : ''}</span></div>
          <div class="detail-item"><label>Enrolled Dogs</label><span>${prog.enrolled_dogs} 🐕</span></div>
        </div>
        ${dogs.length ? `
          <div style="margin-top:12px">
            <div style="font-size:.75rem;font-weight:600;text-transform:uppercase;letter-spacing:.06em;color:var(--text-mute);margin-bottom:8px">Enrolled Dogs</div>
            <div style="display:flex;flex-direction:column;gap:6px">
              ${dogs.map(d => `
                <div style="display:flex;align-items:center;justify-content:space-between;padding:8px 12px;background:var(--cream);border-radius:8px;font-size:.85rem">
                  <span><strong>${d.name}</strong> · ${d.breed || '—'}</span>
                  <span class="chip chip-amber">${d.size}</span>
                </div>
              `).join('')}
            </div>
          </div>
        ` : '<div style="font-size:.85rem;color:var(--text-mute);margin-top:8px">No dogs enrolled yet</div>'}
      `;
      grid.appendChild(card);
    }
  } catch (err) {
    container.innerHTML = `<div class="empty-state"><div class="empty-icon">⚠️</div><p>${err.message}</p></div>`;
  }
}

loadTraining();
</script>
</body>
</html>
