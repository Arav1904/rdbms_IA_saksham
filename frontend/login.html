<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>Sign In — Paws Shelter Management</title>
  <meta name="description" content="Sign in to Paws Shelter Management System — the unified hub for pet adoptions, staff, and shelter operations."/>
  <link rel="stylesheet" href="css/main.css"/>
</head>
<body>
<div class="login-page">

  <!-- LEFT — Photo panel -->
  <div class="login-left">
    <div class="login-left-bg" style="background-image:url('images/shelter_bg.png')"></div>
    <div class="login-left-overlay"></div>
    <div class="login-left-content">
      <div class="login-brand-pill">
        <div class="bp-icon"></div>
        <span>Paws Shelter</span>
      </div>
      <h2>Give every pet<br>a loving home.</h2>
      <p>One polished platform for adoptions, appointments, and team operations — built for shelter staff who care deeply.</p>
      <div class="login-stats" id="login-stats">
        <div class="ls-card">
          <div class="ls-num" id="ls-pets">—</div>
          <div class="ls-label">Active pets</div>
        </div>
        <div class="ls-card">
          <div class="ls-num" id="ls-adopted">—</div>
          <div class="ls-label">Adoptions</div>
        </div>
        <div class="ls-card">
          <div class="ls-num" id="ls-adopters">—</div>
          <div class="ls-label">Adopters</div>
        </div>
      </div>
    </div>
  </div>

  <!-- RIGHT — Form panel -->
  <div class="login-right">
    <div class="login-form-box">
      <div class="login-header">
        <div>
          <p class="login-eyebrow">Welcome back</p>
          <h3>Sign in to your workspace</h3>
        </div>
        <span class="login-pill"> Secure</span>
      </div>

      <div class="form-tabs">
        <button class="form-tab active" id="tab-login" onclick="switchTab('login',this)">Sign In</button>
        <button class="form-tab" id="tab-register" onclick="switchTab('register',this)">Register</button>
      </div>

      <!-- LOGIN FORM -->
      <div id="form-login">
        <div class="input-group">
          <label for="login-user">Username</label>
          <div class="input-icon">
            <svg viewBox="0 0 24 24"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
            <input type="text" id="login-user" placeholder="Username" autocomplete="username"/>
          </div>
        </div>
        <div class="input-group">
          <label for="login-pass">Password</label>
          <div class="input-icon">
            <svg viewBox="0 0 24 24"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
            <input type="password" id="login-pass" placeholder="••••••••" autocomplete="current-password"/>
          </div>
        </div>
        <div class="forgot-row">
          <button type="button" class="link-btn">Forgot password?</button>
        </div>
        <button class="btn btn-primary btn-full" onclick="doLogin()" id="btn-login">
          <svg viewBox="0 0 24 24"><path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4"/><polyline points="10 17 15 12 10 7"/><line x1="15" y1="12" x2="3" y2="12"/></svg>
          Sign In
        </button>
        <div class="login-footnote">Sign in with a user stored in the backend database.</div>
      </div>

      <!-- REGISTER FORM -->
      <div id="form-register" style="display:none">
        <div class="form-grid">
          <div class="form-group">
            <label class="form-label">Full Name</label>
            <input class="form-input" id="reg-name" placeholder="Your full name"/>
          </div>
          <div class="form-group">
            <label class="form-label">Email</label>
            <input class="form-input" id="reg-email" placeholder="you@shelter.com" type="email"/>
          </div>
          <div class="form-group">
            <label class="form-label">Username</label>
            <input class="form-input" id="reg-user" placeholder="Choose username"/>
          </div>
          <div class="form-group">
            <label class="form-label">Password</label>
            <input class="form-input" id="reg-pass" placeholder="Create password" type="password"/>
          </div>
          <div class="form-group full">
            <label class="form-label">Role</label>
            <input class="form-input" id="reg-role" placeholder="e.g. Manager, Staff" value="Staff"/>
          </div>
        </div>
        <button class="btn btn-primary btn-full" onclick="doRegister()">
          <svg viewBox="0 0 24 24"><path d="M16 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="8.5" cy="7" r="4"/><line x1="20" y1="8" x2="20" y2="14"/><line x1="23" y1="11" x2="17" y2="11"/></svg>
          Create Account
        </button>
      </div>
    </div>
  </div>

</div>

<div id="toast-container"></div>
<script src="js/api.js"></script>
<script src="js/app.js"></script>
<script>
// If already logged in, go to dashboard
if (getAuth()?.loggedIn) location.href = '/dashboard';

// Load live stats for branding panel
async function loadStats() {
  try {
    const s = await API.get('/dashboard/stats');
    document.getElementById('ls-pets').textContent     = s.pets.total;
    document.getElementById('ls-adopted').textContent  = s.pets.adopted;
    document.getElementById('ls-adopters').textContent = s.adopters.total;
  } catch(e) { /* silently fail */ }
}
loadStats();

function switchTab(tab, btn) {
  document.getElementById('form-login').style.display    = tab === 'login'    ? '' : 'none';
  document.getElementById('form-register').style.display = tab === 'register' ? '' : 'none';
  document.querySelectorAll('.form-tab').forEach(t => t.classList.remove('active'));
  btn.classList.add('active');
}

async function doLogin() {
  const u = document.getElementById('login-user').value.trim();
  const p = document.getElementById('login-pass').value.trim();
  if (!u || !p) { showToast('Please enter username and password', 'error'); return; }
  try {
    const data = await API.post('/auth/login', { username: u, password: p });
    localStorage.setItem('shelter_auth', JSON.stringify({
      loggedIn: true,
      name: data.user.name,
      role: data.user.role,
      username: data.user.username,
      email: data.user.email || null
    }));
    showToast(`Welcome back, ${data.user.name}!`, 'success');
    setTimeout(() => location.href = '/dashboard', 900);
  } catch (err) {
    showToast(err.message, 'error');
  }
}

async function doRegister() {
  const name  = document.getElementById('reg-name').value.trim();
  const email = document.getElementById('reg-email').value.trim();
  const user  = document.getElementById('reg-user').value.trim();
  const pass  = document.getElementById('reg-pass').value.trim();
  const role  = document.getElementById('reg-role').value.trim();
  if (!name || !user || !pass) { showToast('Name, username and password are required', 'error'); return; }
  try {
    await API.post('/auth/register', {
      name,
      email,
      username: user,
      password: pass,
      role: role || 'Staff'
    });
    showToast('Account created. Please sign in.', 'success');
    setTimeout(() => switchTab('login', document.getElementById('tab-login')), 900);
  } catch (err) {
    showToast(err.message, 'error');
  }
}

document.addEventListener('keydown', e => {
  if (e.key === 'Enter') {
    const active = document.getElementById('form-login').style.display !== 'none';
    if (active) doLogin(); else doRegister();
  }
});
</script>
</body>
</html>
